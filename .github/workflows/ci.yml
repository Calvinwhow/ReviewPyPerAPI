name: CI

on:
  push:
    branches: [main, new_v3]
  pull_request:
    branches: [main]

jobs:
  frontend-unit:
    name: Frontend unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose -f docker-compose.test.yml run --rm frontend-unit

  gateway-tests:
    name: Gateway unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose -f docker-compose.test.yml run --rm gateway-tests

  e2e:
    name: E2E tests (synthetic)
    runs-on: ubuntu-latest
    needs: [frontend-unit, gateway-tests]
    steps:
      - uses: actions/checkout@v4
      - run: >
          docker compose -f docker-compose.test.yml up
          --build --abort-on-container-exit --exit-code-from e2e
          gateway-e2e frontend-e2e e2e
