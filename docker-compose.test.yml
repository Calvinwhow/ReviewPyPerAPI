# Run all test suites in containers — no local node/python required.
#
#   docker compose -f docker-compose.test.yml run --rm frontend-unit
#   docker compose -f docker-compose.test.yml run --rm e2e
#
# Or run everything:
#   docker compose -f docker-compose.test.yml up --abort-on-container-exit \
#       --exit-code-from e2e

services:
  # ---- Frontend Vitest unit tests ----
  frontend-unit:
    build:
      context: ./reviewpyper_frontend
      dockerfile: Dockerfile.test
      target: test
    command: npm test

  # ---- E2E stack: API + frontend dev server + Playwright ----
  reviewpyper-api-e2e:
    platform: linux/amd64
    build:
      context: .
      dockerfile: reviewpyper_api/containers/Dockerfile.prod
    environment:
      DATA_DIR: /data
    volumes:
      - api-e2e-data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 5s
      timeout: 3s
      retries: 30

  frontend-e2e:
    build:
      context: ./reviewpyper_frontend
      dockerfile: Dockerfile.test
      target: dev
    environment:
      VITE_API_PROXY: http://reviewpyper-api-e2e:8000
    depends_on:
      reviewpyper-api-e2e:
        condition: service_healthy

  e2e:
    build:
      context: ./reviewpyper_frontend
      dockerfile: Dockerfile.test
      target: e2e
    environment:
      PLAYWRIGHT_BASE_URL: http://frontend-e2e:5173
      CI: "true"
    depends_on:
      - frontend-e2e
      - reviewpyper-api-e2e
    command: npx playwright test --reporter=list

volumes:
  api-e2e-data:
